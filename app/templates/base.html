<!DOCTYPE html>
<html lang="en" data-theme="cozy">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#d2691e">
    <meta name="description" content="Social Bingo - Find people who match the questions!">
    <title>Soc Ops - Social Bingo</title>
    
    <!-- Google Fonts: Playfair Display for headings, Quicksand for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    
    <!-- Initialize theme immediately to prevent flash -->
    <script>
        (function() {
            const theme = localStorage.getItem('soc-ops-theme') || 'cozy';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/sounds.js"></script>
</head>
<body>
    <div id="app">
        {% block content %}{% endblock %}
    </div>
    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
</body>
</html>
