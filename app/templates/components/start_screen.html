<div id="game-container" class="animate-fadeIn">
<div class="flex flex-col items-center justify-center min-h-full p-6" style="background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);">
    <div class="text-center max-w-sm w-full">
        <!-- Header with theme + sound toggles -->
        <div class="flex justify-center items-center gap-3 mb-8">
            <button 
                class="theme-toggle" 
                onclick="toggleTheme()"
                title="Toggle theme">
                🎨
            </button>

            <button 
                class="sound-toggle" 
                onclick="toggleSounds()"
                title="Toggle sound effects"
                id="start-sound-btn">
                🔊
            </button>
        </div>

        <!-- Title -->
        <h1 class="text-6xl font-bold mb-2" style="color: var(--color-primary); font-family: 'Playfair Display', serif;">Soc Ops</h1>
        <p class="text-2xl mb-8" style="color: var(--color-secondary); font-family: 'Playfair Display', serif;">Social Bingo Game:  DPAC-Abz </p>

        <!-- Instructions Card -->
        <div class="rounded-2xl p-8 mb-8 animate-slideInDown" style="background-color: var(--bg-card); border: 2px solid var(--border-color); box-shadow: var(--shadow-soft);">
            <h2 class="font-bold mb-4" style="color: var(--text-primary); font-family: 'Playfair Display', serif; font-size: 1.375rem;">How to play</h2>
            <ul class="text-left text-gray-600 text-sm space-y-3 list-item-stagger">
                <li style="color: var(--text-secondary);">🔍 Find people who match the questions</li>
                <li style="color: var(--text-secondary);">👆 Tap a square when you find a match</li>
                <li style="color: var(--text-secondary);">🎉 Get 5 in a row to win!</li>
            </ul>
        </div>

        <!-- Start Button -->
        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full btn-primary text-lg"
            style="background-color: var(--color-primary);">
            Start Game
        </button>

        
    </div>
</div>
</div>
