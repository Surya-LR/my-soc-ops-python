<div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 animate-fadeIn">
    <div class="rounded-2xl p-8 max-w-xs w-full text-center shadow-xl animate-bounce" 
         style="background-color: var(--bg-card); box-shadow: var(--shadow-warm);"
         onload="playBingoSound()">
        <div class="text-6xl mb-6 animate-fadeIn">🎉</div>
        <h2 class="text-5xl font-bold mb-4" style="color: var(--color-primary); font-family: 'Playfair Display', serif;">BINGO!</h2>
        <p class="text-lg mb-8" style="color: var(--text-secondary);">You completed a line!</p>

        <button
            hx-post="/dismiss-modal"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full btn-primary text-lg"
            style="background-color: var(--color-primary);">
            Keep Playing
        </button>
    </div>
    <script>
        // Play bingo sound when modal appears
        setTimeout(() => playBingoSound(), 100);
    </script>
</div>
