<div id="game-container">
<div class="flex flex-col min-h-full" style="background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);">
    <!-- Header -->
    <header class="flex items-center justify-between p-4 bg-opacity-90" style="background-color: var(--bg-card); border-bottom: 1px solid var(--border-color); box-shadow: var(--shadow-soft);">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="btn-secondary">
            ← Back
        </button>
        <h1 class="font-bold text-gray-900" style="font-family: 'Playfair Display', serif; font-size: 1.5rem;">Soc Ops</h1>
        <div class="flex items-center gap-2">
            <button 
                class="sound-toggle" 
                onclick="toggleSounds()"
                title="Toggle sound effects"
                id="sound-btn">
                🔊
            </button>
            <button 
                class="theme-toggle" 
                onclick="toggleTheme()"
                title="Toggle theme">
                🎨
            </button>
        </div>
    </header>

    <!-- Instructions -->
    <p class="text-center text-gray-500 text-sm py-3 px-4">
        Tap a square when you find someone who matches it.
    </p>

    <!-- Bingo indicator -->
    {% if session.has_bingo %}
    <div class="bg-amber-100 text-amber-800 text-center py-2 font-semibold text-sm" style="background-color: var(--color-accent-alt); color: var(--text-primary);">
        🎉 BINGO! You got a line!
    </div>
    {% endif %}

    <!-- Board -->
    <div class="flex-1 flex items-center justify-center p-4">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
