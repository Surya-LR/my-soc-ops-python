<div class="grid grid-cols-5 gap-2 w-full max-w-md mx-auto aspect-square">
    {% for square in session.board %}
    {% set is_winning = square.id in session.winning_square_ids %}
    <button
        {% if not square.is_free_space %}
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        onclick="playMarkSound()"
        {% endif %}
        {% if square.is_free_space %}disabled{% endif %}
        class="board-square relative flex items-center justify-center p-2 text-center transition-all duration-300 select-none min-h-[60px] text-xs leading-tight font-medium"
        style="
            {% if square.is_marked %}
                {% if is_winning %}
                    background-color: var(--color-accent-alt);
                    border: 2px solid var(--color-primary);
                    color: var(--color-primary-dark);
                {% else %}
                    background-color: var(--color-secondary-light);
                    border: 2px solid var(--color-secondary);
                    color: var(--color-primary-dark);
                {% endif %}
            {% else %}
                background-color: var(--bg-card);
                border: 2px solid var(--border-color);
                color: var(--text-primary);
            {% endif %}
            {% if square.is_free_space %}
                font-weight: 700;
                font-size: 0.875rem;
            {% endif %}
        "
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
        <span class="wrap-break-word hyphens-auto">{{ square.text }}</span>
        {% if square.is_marked and not square.is_free_space %}
        <span class="absolute top-1 right-1 text-sm">✓</span>
        {% endif %}
    </button>
    {% endfor %}
</div>
